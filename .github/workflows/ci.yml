name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  contents: read

jobs:
  backend-lint-test:
    name: Backend Lint & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simulador_api_test?schema=public
          OPENAI_API_KEY: test-key
          OPENAI_MODEL: gpt-4.1-mini
        run: pnpm --dir apps/backend exec prisma validate --schema prisma/schema.prisma

      - name: Lint
        run: pnpm --dir apps/backend lint

      - name: Unit + integration coverage
        env:
          OPENAI_API_KEY: test-key
          OPENAI_MODEL: gpt-4.1-mini
        run: pnpm --dir apps/backend test:coverage

      - name: Backend coverage summary
        run: cat apps/backend/coverage/coverage-summary.json

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            apps/backend/coverage/lcov.info
            apps/backend/coverage/coverage-summary.json

  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        run: pnpm lint:web

      - name: Frontend app typecheck
        run: pnpm typecheck:web:app

      - name: Frontend spec typecheck
        run: pnpm typecheck:web:spec

      - name: Frontend headless tests
        run: pnpm test:web

      - name: Frontend production build
        run: pnpm build

  backend-db-integration:
    name: Backend DB Integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: simulador_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d simulador_api_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simulador_api_test?schema=public
        run: pnpm --dir apps/backend exec prisma generate

      - name: Prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simulador_api_test?schema=public
        run: pnpm --dir apps/backend exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Run DB integration tests
        env:
          NODE_ENV: test
          RUN_DB_TESTS: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simulador_api_test?schema=public
          OPENAI_API_KEY: test-key
          OPENAI_MODEL: gpt-4.1-mini
        run: pnpm --dir apps/backend exec vitest run src/__tests__/db.integration.test.ts

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck if scripts exist
        run: |
          SH_FILES=$(git ls-files '*.sh')

          if [ -z "$SH_FILES" ]; then
            echo "No shell scripts found. Skipping shellcheck."
            exit 0
          fi

          echo "$SH_FILES" | xargs shellcheck
