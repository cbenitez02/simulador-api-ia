<div class="select-menu">
  <button
    type="button"
    class="select-menu__trigger"
    [id]="triggerId"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
    [attr.aria-controls]="listboxId"
    (click)="toggle()"
  >
    <span class="select-menu__icon">
      <ng-content select="[data-select-menu-icon]"></ng-content>
    </span>
    <span class="select-menu__label">{{ currentLabel }}</span>
    <span class="select-menu__chevron" [class.select-menu__chevron--open]="open()" aria-hidden="true">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="m6 9 6 6 6-6"></path>
      </svg>
    </span>
  </button>
  @if (open()) {
    <div class="select-menu__panel" role="listbox" [id]="listboxId" [attr.aria-labelledby]="triggerId">
      @for (opt of options; track opt.value) {
        <button
          type="button"
          class="select-menu__option"
          [class.select-menu__option--current]="value === opt.value"
          role="option"
          [attr.aria-selected]="value === opt.value"
          (click)="pick(opt.value)"
        >
          {{ opt.label }}
        </button>
      }
    </div>
  }
</div>
