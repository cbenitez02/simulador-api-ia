services:
  postgres-test:
    image: postgres:16-alpine
    container_name: simulador-api-ia-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simulador_api_test
    ports:
      - '54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d simulador_api_test']
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - simulador_api_ia_test_db:/var/lib/postgresql/data

volumes:
  simulador_api_ia_test_db:
