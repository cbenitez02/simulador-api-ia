schema: spec-driven

context: |
  Tech stack: pnpm monorepo with Node.js 22+, TypeScript, Express 5 backend, Angular 21 frontend, Prisma/PostgreSQL.
  Architecture: app-per-folder monorepo; backend uses feature modules with router/schema/service splits; frontend uses feature/shared/data-access organization with standalone components.
  Testing: Vitest in backend and web; backend adds Supertest + DB integration flows; web uses jsdom + Angular TestBed harness.
  Style: ESLint flat config, Prettier, commitlint conventional commits, Husky + lint-staged.

strict_tdd: true

testing:
  detected: 2026-04-25
  strict_tdd: true
  runner:
    available: true
    framework: Vitest
    command: pnpm --dir apps/backend test && pnpm --dir apps/web test
  layers:
    unit:
      available: true
      tool: Vitest
    integration:
      available: true
      tool: Supertest + Vitest + PostgreSQL / Angular Vitest integration specs
    e2e:
      available: false
      tool: null
  coverage:
    available: true
    command: pnpm --dir apps/backend test:coverage && pnpm --dir apps/web test:coverage
  quality:
    linter:
      available: true
      command: pnpm lint
    type_checker:
      available: true
      command: pnpm typecheck:web:app && pnpm typecheck:web:spec && pnpm --dir apps/backend build
    formatter:
      available: true
      command: pnpm format:check

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
